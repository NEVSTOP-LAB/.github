name: Sync GitHub to Gitee

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 2:00 自动同步
  workflow_dispatch:        # 支持手动触发

concurrency:
  group: sync-github-to-gitee
  cancel-in-progress: true
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync GitHub to Gitee
        uses: NEVSTOP-LAB/GitHub-Gitee-Sync@main
        with:
          github-owner: NEVSTOP-LAB
          github-token: ${{ secrets.SYNC_GITHUB_TOKEN }}
          gitee-owner: NEVSTOP-LAB
          gitee-token: ${{ secrets.SYNC_GITEE_TOKEN }}
          account-type: org
          sync-extra: 'releases,wiki,labels'
          direction: github2gitee
