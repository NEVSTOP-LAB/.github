name: CSM Q&A Discussion Bot

on:
  # 当有新仓库级 Discussion 创建时自动触发
  discussion:
    types: [created]

  # 当有新仓库级 Discussion 评论（追问）时自动触发；Bot 自身发布评论时跳过（防止无限循环）
  discussion_comment:
    types: [created]

  # 实时触发：由外部 Webhook Relay（Cloudflare Worker，详见 webhook/README.md）
  # 在收到组织级 discussion.created / discussion_comment.created webhook 后，
  # 调用 dispatches API 触发本事件。client_payload.discussion_number 必填。
  repository_dispatch:
    types: [org_discussion_created]

  # 手动触发：对组织 Q&A 分类下所有 open 的 discussion 做全量扫描，
  # 自动回复未答复的 discussion 以及在 Bot 回复后又有新追问的 discussion。
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run 模式（只打印不发布评论）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# 同一时刻只允许一个实例运行，避免重复回复
concurrency:
  group: csm-qa-bot-${{ github.event.discussion.number || github.event.client_payload.discussion_number || 'scan' }}
  cancel-in-progress: false

jobs:
  answer:
    name: Answer Discussion
    runs-on: ubuntu-latest
    permissions:
      # 读取仓库内容
      contents: read
      # 读写 Discussions（通过 Fine-grained PAT，Actions 权限仅供参考）
      discussions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 使用 Fine-grained PAT 与 secrets.CSM_QA_GH_TOKEN 保持一致鉴权来源
          token: ${{ secrets.CSM_QA_GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 解析 CSM-QA-Robot 远程仓库当前 HEAD commit SHA，用于 venv 缓存 key。
      # requirements-bot.txt 中的 csm_qa 依赖来自 git+https，未 pin 版本，
      # 因此仅 hashFiles(requirements-bot.txt) 不足以区分上游变更。把上游 SHA
      # 拼进 cache key，能在 CSM-QA-Robot 主线更新时自动让 venv 缓存失效，
      # 避免"假命中"用到旧依赖。
      - name: Resolve CSM-QA-Robot latest commit SHA
        id: csmqa-sha
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SLUG="NEVSTOP-LAB/CSM-QA-Robot"
          REPO_API_URL="https://api.github.com/repos/${SLUG}"
          DEFAULT_BRANCH=$(curl -fsSL \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "$REPO_API_URL" | python -c "import sys,json; print(json.load(sys.stdin)['default_branch'])")
          API_URL="https://api.github.com/repos/${SLUG}/commits/${DEFAULT_BRANCH}"
          SHA=$(curl -fsSL \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "$API_URL" | python -c "import sys,json; print(json.load(sys.stdin)['sha'])")
          echo "CSM-QA-Robot ($SLUG) default branch: $DEFAULT_BRANCH, HEAD: $SHA"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      # 注意：使用 cache/restore + cache/save 的拆分写法，而不是 actions/cache@v4。
      # 原因：actions/cache@v4 的 post-save 仅在 job success 时执行；本 bot 早期
      # 失败（如配置不对）时缓存永远不会保存，导致下一次重跑仍然 miss，
      # 形成"永远命中不到"的死循环。拆开后用 if: always() 强制保存。
      #
      # 缓存整个 .venv（已安装依赖的虚拟环境），命中时可完全跳过 pip install，
      # 把 Install dependencies 从 ~60s 降到 ~秒级。key 包含：
      #   - runner.os：跨平台环境不可复用
      #   - python 版本（写死 3.11，与 setup-python 保持一致）
      #   - hashFiles(requirements-bot.txt)：requirements 文件本身变更
      #   - csmqa-sha：CSM-QA-Robot 上游 commit 变更
      - name: Restore venv cache
        id: cache-venv
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-py3.11-${{ hashFiles('requirements-bot.txt') }}-${{ steps.csmqa-sha.outputs.sha }}
          restore-keys: |
            ${{ runner.os }}-venv-py3.11-${{ hashFiles('requirements-bot.txt') }}-
            ${{ runner.os }}-venv-py3.11-

      - name: Restore HuggingFace models cache
        id: cache-hf
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-BAAI-bge-small-zh-v1.5
          restore-keys: |
            ${{ runner.os }}-hf-

      # 解析 csm-wiki 远程仓库当前 HEAD commit SHA，用于 vector store 缓存 key。
      # 必须在 actions/cache 之前执行，否则 cache key 会与实际 wiki 内容脱节，
      # 导致每次都重建 RAG（参见 csm_qa/wiki_updater.py 中的 commit 比对逻辑）。
      - name: Resolve csm-wiki latest commit SHA
        id: wiki-sha
        env:
          # 使用 GITHUB_TOKEN 提升 API 速率限制（公开仓库读取 API 即使无 token 也可用）
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SOURCE_FILE="csm-wiki/wiki_source.json"
          REPO_URL=$(python -c "import json; print(json.load(open('$SOURCE_FILE'))['url'])")
          # 形如 https://github.com/NEVSTOP-LAB/CSM-Wiki(.git)? → owner/repo
          SLUG=$(echo "$REPO_URL" | sed -E 's#^https?://github\.com/([^/]+/[^/]+?)(\.git)?/?$#\1#')
          # 不要硬编码分支名：先查询仓库 default_branch，与
          # csm_qa/wiki_updater.fetch_latest_commit_id 的 main→master 兜底保持一致
          REPO_API_URL="https://api.github.com/repos/${SLUG}"
          DEFAULT_BRANCH=$(curl -fsSL \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "$REPO_API_URL" | python -c "import sys,json; print(json.load(sys.stdin)['default_branch'])")
          API_URL="https://api.github.com/repos/${SLUG}/commits/${DEFAULT_BRANCH}"
          SHA=$(curl -fsSL \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "$API_URL" | python -c "import sys,json; print(json.load(sys.stdin)['sha'])")
          echo "csm-wiki ($SLUG) default branch: $DEFAULT_BRANCH, HEAD: $SHA"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Restore vector store cache
        id: cache-vs
        uses: actions/cache/restore@v4
        with:
          # 同时缓存 wiki_source.json 与 wiki 克隆目录，
          # 使得 check_and_update_wiki 在缓存命中后能识别"已是最新"并跳过重建。
          path: |
            .csm_qa/vector_store
            csm-wiki/wiki_source.json
            csm-wiki/remote
          key: ${{ runner.os }}-vectorstore-${{ steps.wiki-sha.outputs.sha }}
          restore-keys: |
            ${{ runner.os }}-vectorstore-

      - name: Install dependencies
        id: install-deps
        # 安装 csm_qa SDK（托管于 NEVSTOP-LAB/CSM-QA-Robot），仅保留 LLM+RAG 核心库。
        # - 缓存命中时直接复用 .venv，跳过解析与安装；
        # - 未命中时用 uv（比 pip 快 5–10x）创建 venv 并安装依赖。
        # 无论是否命中，都把 VIRTUAL_ENV/PATH 写入 $GITHUB_ENV，
        # 让后续 "Run bot" 步骤的 `python` 指向 .venv/bin/python。
        run: |
          set -euo pipefail
          if [ "${{ steps.cache-venv.outputs.cache-hit }}" = "true" ] && [ -x ".venv/bin/python" ]; then
            echo "venv cache hit; skipping install"
          else
            python -m pip install --disable-pip-version-check --quiet uv
            python -m uv venv .venv
            python -m uv pip install --python .venv/bin/python -r requirements-bot.txt
          fi
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      # pip 依赖已成功安装，立即保存 venv 缓存（独立于后续 bot 是否成功）。
      # 仅在 install 步骤成功且未命中时保存，避免污染缓存为不完整状态。
      - name: Save venv cache
        if: always() && steps.install-deps.outcome == 'success' && steps.cache-venv.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .venv
          key: ${{ steps.cache-venv.outputs.cache-primary-key }}

      - name: Run bot (discussion event trigger)
        if: github.event_name == 'discussion' || (github.event_name == 'discussion_comment' && github.event.comment.user.type != 'bot')
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          CSM_QA_GH_TOKEN: ${{ secrets.CSM_QA_GH_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          # 组织级 Q&A discussions 实际归属源仓库 <org>/.github。
          # 留空时代码会按 <github.repository_owner>/.github 推导。
          DISCUSSION_SOURCE_REPO: ${{ github.repository_owner }}/.github
        run: python scripts/discussion_bot.py --event

      - name: Run bot (repository_dispatch from webhook relay)
        if: github.event_name == 'repository_dispatch'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          CSM_QA_GH_TOKEN: ${{ secrets.CSM_QA_GH_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          DISCUSSION_NUMBER: ${{ github.event.client_payload.discussion_number }}
          DISCUSSION_SOURCE_REPO: ${{ github.repository_owner }}/.github
        run: |
          if [ -z "$DISCUSSION_NUMBER" ]; then
            echo "Error: client_payload.discussion_number 为空" >&2
            exit 1
          fi
          python scripts/discussion_bot.py --org-discussion-number "$DISCUSSION_NUMBER"

      - name: Run bot (manual full scan)
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          CSM_QA_GH_TOKEN: ${{ secrets.CSM_QA_GH_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          DISCUSSION_SOURCE_REPO: ${{ github.repository_owner }}/.github
        run: |
          ARGS="--scan-org"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/discussion_bot.py $ARGS

      # HF 模型与向量库的下载/构建发生在 bot 启动早期，即使后续 bot 失败，
      # 也应保存这两个缓存以加速下次重跑。使用 if: always() 强制保存。
      # 在保存前先检查目录是否存在且非空：bot 可能在下载/构建之前就提前退出
      # （如配置错误），此时 cache/save 若直接执行会因路径不存在而失败，
      # 把缓存步骤变成新的不稳定因素，掩盖真正的根因。
      - name: Check HuggingFace cache populated
        id: check-hf-populated
        if: always() && steps.cache-hf.outputs.cache-hit != 'true'
        run: |
          if [ -d "$HOME/.cache/huggingface" ] && [ -n "$(ls -A "$HOME/.cache/huggingface" 2>/dev/null)" ]; then
            echo "populated=true" >> "$GITHUB_OUTPUT"
          else
            echo "populated=false" >> "$GITHUB_OUTPUT"
            echo "Skipping HF cache save: ~/.cache/huggingface missing or empty"
          fi

      - name: Save HuggingFace models cache
        if: always() && steps.cache-hf.outputs.cache-hit != 'true' && steps.check-hf-populated.outputs.populated == 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ steps.cache-hf.outputs.cache-primary-key }}

      - name: Check vector store cache populated
        id: check-vs-populated
        if: always() && steps.cache-vs.outputs.cache-hit != 'true'
        run: |
          if [ -d ".csm_qa/vector_store" ] && [ -n "$(ls -A .csm_qa/vector_store 2>/dev/null)" ]; then
            echo "populated=true" >> "$GITHUB_OUTPUT"
          else
            echo "populated=false" >> "$GITHUB_OUTPUT"
            echo "Skipping vector store cache save: .csm_qa/vector_store missing or empty"
          fi

      - name: Save vector store cache
        if: always() && steps.cache-vs.outputs.cache-hit != 'true' && steps.check-vs-populated.outputs.populated == 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .csm_qa/vector_store
            csm-wiki/wiki_source.json
            csm-wiki/remote
          key: ${{ steps.cache-vs.outputs.cache-primary-key }}
