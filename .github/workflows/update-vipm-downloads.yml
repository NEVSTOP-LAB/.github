name: Update VIPM Downloads

on:
  schedule:
    - cron: '0 17 * * *'   # 每天北京时间 1:00 自动同步 (UTC 17:00)
  workflow_dispatch:        # Allow manual triggering

permissions:
  contents: write

concurrency:
  group: update-vipm-downloads
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Update VIPM download counts
        run: python scripts/update_vipm_downloads.py profile/README.md

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/README.md

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update VIPM download counts"

          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi

            echo "git push failed on attempt ${attempt}; fetching and rebasing onto origin/main before retrying"
            git fetch origin main
            git rebase origin/main
          done

          echo "Failed to push changes after 3 attempts"
          exit 1
