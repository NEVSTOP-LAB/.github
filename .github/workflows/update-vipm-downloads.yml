name: Update VIPM Downloads

on:
  schedule:
    - cron: '0 2 * * *'   # Daily at 02:00 UTC (Beijing time 10:00)
  workflow_dispatch:        # Allow manual triggering

permissions:
  contents: write

concurrency:
  group: update-vipm-downloads
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.UPDATE_README_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Update VIPM download counts
        run: python scripts/update_vipm_downloads.py profile/README.md

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          git diff --staged --quiet || git commit -m "chore: update VIPM download counts"
          git push
