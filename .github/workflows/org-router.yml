name: Org Discussion Router

on:
  repository_dispatch:
    types: [org_msg_router]
  workflow_dispatch:
    inputs:
      discussion_number:
        description: 'Discussion 编号'
        required: true
        type: string
      comment_body:
        description: '评论正文（可选，用于手动模拟）'
        required: false
        type: string
      comment_author:
        description: '评论作者（可选）'
        required: false
        type: string
      category_name:
        description: '分类名（可选）'
        required: false
        type: string
      dry_run:
        description: 'Dry-run 模式（只打印不写评论）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  route:
    runs-on: ubuntu-latest
    concurrency:
      group: org-router-${{ github.event.client_payload.discussion_number || github.event.inputs.discussion_number }}
      cancel-in-progress: false
    permissions:
      contents: read
      discussions: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CSM_QA_GH_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore venv cache
        id: cache-venv
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-py3.11-${{ hashFiles('requirements-bot.txt') }}

      - name: Install dependencies
        id: install-deps
        run: |
          set -euo pipefail
          if [ "${{ steps.cache-venv.outputs.cache-hit }}" = "true" ] && [ -x ".venv/bin/python" ]; then
            echo "venv cache hit; skipping install"
          else
            rm -rf .venv
            python -m pip install --disable-pip-version-check --quiet uv
            python -m uv venv .venv
            python -m uv pip install --python .venv/bin/python -r requirements-bot.txt
          fi
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Save venv cache
        if: always() && steps.install-deps.outcome == 'success' && steps.cache-venv.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .venv
          key: ${{ steps.cache-venv.outputs.cache-primary-key }}

      - name: Run tests
        run: python -m pytest tests/test_router.py -v

      - name: Route & Process
        env:
          CSM_QA_GH_TOKEN: ${{ secrets.CSM_QA_GH_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DISCUSSION_SOURCE_REPO: ${{ github.repository_owner }}/.github
          JOIN_FOLLOW_ORG: ${{ vars.JOIN_FOLLOW_ORG || 'NEVSTOP-LAB' }}
          JOIN_STAR_REPOS: ${{ vars.JOIN_STAR_REPOS || 'csm-core,API String,MassData,INIVariable' }}
          ROUTER_DISCUSSION_NUMBER: ${{ github.event.client_payload.discussion_number || github.event.inputs.discussion_number }}
          ROUTER_COMMENT_BODY: ${{ github.event.client_payload.comment_body || github.event.inputs.comment_body || '' }}
          ROUTER_COMMENT_AUTHOR: ${{ github.event.client_payload.comment_author || github.event.inputs.comment_author || '' }}
          ROUTER_CATEGORY_NAME: ${{ github.event.client_payload.category_name || github.event.inputs.category_name || '' }}
          ROUTER_EVENT_TYPE: ${{ github.event.client_payload.event_type || '' }}
        run: |
          python scripts/router.py \
            --discussion-number "${ROUTER_DISCUSSION_NUMBER}" \
            --comment-body "${ROUTER_COMMENT_BODY}" \
            --comment-author "${ROUTER_COMMENT_AUTHOR}" \
            --category-name "${ROUTER_CATEGORY_NAME}" \
            --event-type "${ROUTER_EVENT_TYPE}" \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
