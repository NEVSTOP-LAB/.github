name: Update Star History

on:
  schedule:
    - cron: '0 */8 * * *'   # Every 8 hours (00:00, 08:00, 16:00 UTC)
  workflow_dispatch:          # Allow manual triggering

permissions:
  contents: write

concurrency:
  group: update-star-history
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Update Star History
        env:
          GITHUB_TOKEN: ${{ secrets.SYNC_GITHUB_TOKEN }}
          # Comma-separated GitHub usernames whose stars should be excluded
          EXCLUDE_USERS: ""
          # Number of characters to reveal for private repo names
          PRIVATE_VISIBLE_CHARS: "10"
          # Number of top repos shown in the ranking table
          TOP_N: "10"
        run: python scripts/update_star_history.py Star-History.md

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Star-History.md

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update Star History"

          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi

            echo "git push failed on attempt ${attempt}; fetching and rebasing before retrying"
            git fetch origin main
            git rebase origin/main
          done

          echo "Failed to push changes after 3 attempts"
          exit 1
