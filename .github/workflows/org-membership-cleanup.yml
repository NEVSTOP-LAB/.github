name: Org Membership Cleanup

on:
  schedule:
    # 每天北京时间 9:00 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run 模式（只打印不实际操作）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

concurrency:
  group: org-membership-cleanup
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run cleanup script
        env:
          SYNC_GITHUB_TOKEN: ${{ secrets.SYNC_GITHUB_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          python scripts/org_membership_cleanup.py ${ARGS:+"$ARGS"}

      - name: Commit and push state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/member_check_state.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update member check state"

          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi

            echo "git push failed on attempt ${attempt}; fetching and rebasing onto origin/main before retrying"
            git fetch origin main
            git rebase origin/main
          done

          echo "Failed to push changes after 3 attempts"
          exit 1
